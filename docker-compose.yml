services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: deliveryzapapi-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - delivery-net

  nginx:
    image: nginx:1.27-alpine
    container_name: deliveryzapapi-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - delivery-net

  mysql:
    image: mysql:8
    container_name: deliveryzapapi-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: deliveryzap
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: deliveryzap
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - delivery-net

  redis:
    image: redis:7-alpine
    container_name: deliveryzapapi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - delivery-net

  adminer:
    image: adminer
    container_name: deliveryzapapi-adminer
    restart: unless-stopped
    ports:
      - "8585:8080"
    depends_on:
      - mysql
    networks:
      - delivery-net

volumes:
  mysql_data:
  redis_data:

networks:
  delivery-net:
    external: true